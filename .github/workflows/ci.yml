name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
        timeout-minutes: 15
      # TEMPORARY diagnostics for the flaky worktree test; remove once solved.
      - name: Worktree test with pipe diagnostics
        timeout-minutes: 5
        continue-on-error: true
        env:
          PORCELAIN_GIT_DEBUG_LOG: /tmp/porcelain-git-debug.log
        run: swift test --filter testWorktreeLifecycleAndChangeSummary 2>&1 || true
      - name: Dump pipe diagnostics
        if: always()
        run: cat /tmp/porcelain-git-debug.log 2>/dev/null || echo "no debug log written"
      - name: Test
        run: swift test --parallel
        timeout-minutes: 8
